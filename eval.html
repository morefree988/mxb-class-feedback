<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>春江花月夜 · 课程评价</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: "KaiTi", "STKaiti", "SimSun", "PingFang SC", "Microsoft YaHei", serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 15px;
  position: relative;
  background-color: #0c1e19;
}

/* 柔和古风背景 */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at 80% 20%,
      rgba(255,250,210,0.8) 0%,
      rgba(255,235,170,0.5) 14%,
      transparent 40%),
    linear-gradient(135deg, #1e4035 0%, #1e4035 14%, transparent 14%),
    linear-gradient(150deg, #2a5546 0%, #2a5546 22%, transparent 22%),
    linear-gradient(110deg, #154235 0%, #154235 30%, transparent 30%),
    linear-gradient(75deg, #0e362b 0%, #0e362b 38%, transparent 38%),
    repeating-linear-gradient(95deg,
      rgba(110,140,120,0.2) 0px,
      rgba(110,140,120,0.2) 1px,
      transparent 1px,
      transparent 24px),
    radial-gradient(circle at 20% 88%, rgba(255,185,155,0.5) 0%, transparent 15%),
    radial-gradient(circle at 45% 92%, rgba(255,190,160,0.5) 0%, transparent 14%),
    radial-gradient(circle at 75% 85%, rgba(250,180,150,0.5) 0%, transparent 15%),
    radial-gradient(ellipse at 68% 32%, #557a68 0%, #557a68 2%, transparent 3%),
    radial-gradient(ellipse at 74% 29%, #476b5c 0%, #476b5c 1.8%, transparent 2.8%);
  background-size: auto;
  opacity: 0.95;
  animation: slowDrift 30s infinite alternate ease-in-out;
}

/* 宣纸纹理 */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
  background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" opacity="0.08"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3"/></filter><rect width="100%" height="100%" filter="url(%23noise)"/></svg>');
  background-repeat: repeat;
  background-size: 120px 100px;
  mix-blend-mode: overlay;
}

/* 主卡片 */
.card {
  position: relative;
  z-index: 10;
  width: 100%;
  max-width: 380px;
  background: rgba(250,245,235,0.93);
  backdrop-filter: blur(6px);
  border-radius: 32px;
  padding: 35px 25px;
  text-align: center;
  box-shadow: 0 12px 32px rgba(0,0,0,0.4);
  border: 1px solid rgba(170,140,100,0.4);
}

/* 内边框 */
.card::before {
  content: '';
  position: absolute;
  top: 12px; left: 12px; right: 12px; bottom: 12px;
  border: 1px solid rgba(130,100,70,0.25);
  border-radius: 24px;
  pointer-events: none;
}

/* 小印章 */
.seal-mark {
  position: absolute;
  left: 20px; top: 20px;
  width: 40px; height: 40px;
  opacity: 0.45;
  background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect x="20" y="30" width="60" height="40" fill="none" stroke="%23855e3c" stroke-width="1"/><text x="50" y="65" font-size="18" text-anchor="middle" fill="%23855e3c" font-family="KaiTi">春江</text></svg>') no-repeat center;
  background-size: contain;
}

/* 标题 */
h1 {
  font-size: 26px;
  font-weight: normal;
  color: #2b3a2a;
  letter-spacing: 3px;
  margin-bottom: 20px;
  position: relative;
  padding-bottom: 10px;
}
h1::after {
  content: '';
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 120px; height: 1px;
  background: #bc8f6a;
}

/* 诗句 */
.subtitle {
  font-size: 15px;
  color: #4d3a25;
  line-height: 1.8;
  background: rgba(225,205,175,0.35);
  padding: 10px 18px;
  border-radius: 24px;
  margin-bottom: 35px;
  display: inline-block;
}

/* 按钮 */
.btn {
  display: inline-block;
  padding: 14px 36px;
  background: linear-gradient(145deg, #9b764c, #7c5a38);
  color: #fff7e8;
  text-decoration: none;
  border-radius: 30px;
  font-size: 17px;
  letter-spacing: 2px;
  border: 1px solid #ebdbbd;
  box-shadow: 0 6px 14px rgba(30,20,8,0.25);
  min-width: 180px;
}
.btn:active {
  transform: scale(0.96);
}

/* 背景小字水印 */
.bg-poem {
  position: fixed;
  bottom: 15px;
  left: 10px;
  writing-mode: vertical-rl;
  font-size: 12px;
  color: #8d7a5f;
  opacity: 0.2;
  z-index: 1;
  pointer-events: none;
  font-family: "KaiTi", serif;
}

@keyframes slowDrift {
  0% { background-position: 0% 0%; }
  100% { background-position: 1% 1%; }
}
</style>
</head>

<body>

<div class="card">
  <div class="seal-mark"></div>
  <h1>🌙 春江花月夜 · 微慕课评价</h1>
  <div class="subtitle">
    江流宛转绕芳甸，月照花林皆似霰<br>
    感谢您体验本次课程，恳请留下宝贵评价
  </div>
  <a href="https://wj.qq.com/s2/26225508/6b23/" class="btn" target="_blank">进入评价</a>
</div>

<div class="bg-poem">春江潮水连海平 海上明月共潮生</div>

</body>
</html>
