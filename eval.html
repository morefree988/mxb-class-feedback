<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>春江花月夜 · 课程评价</title>
<style>
  /* 清除所有复杂样式，只保留手机优雅古风 */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    /* 保证手机微信优先使用楷体，强指定 */
    font-family: "STKaiti", "华文楷书", "楷体", "KaiTi", "Microsoft YaHei", "PingFang SC", serif;
    min-height: 100vh;
    background: #0d1f1b;  /* 深色底，衬托古意 */
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
  }

  /* 极简背景：一轮淡月和些许远山（轻量，不卡顿） */
  body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 85% 15%, rgba(255, 245, 200, 0.3) 0%, rgba(255, 235, 170, 0.15) 30%, transparent 70%),
                linear-gradient(140deg, #1b3e34 0%, #1b3e34 10%, transparent 10%),
                linear-gradient(155deg, #265a4a 0%, #265a4a 20%, transparent 20%);
    background-repeat: no-repeat;
    background-size: auto, auto, auto;
    opacity: 0.7;
    z-index: 0;
    pointer-events: none;
  }

  /* 主卡片：纯白微透的古纸质感，大留白 */
  .card {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
    background: rgba(253, 250, 240, 0.96);
    border-radius: 48px 24px 52px 24px;
    padding: 48px 28px 56px 28px;
    text-align: center;
    box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 250, 210, 0.7);
    border: 1px solid rgba(170, 140, 100, 0.4);
    backdrop-filter: blur(2px);
  }

  /* 极简装饰：一枚小印章和落款，不干扰内容 */
  .seal {
    position: absolute;
    left: 20px;
    top: 28px;
    width: 44px;
    height: 44px;
    opacity: 0.45;
    background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><path fill="none" stroke="%237a5a3a" stroke-width="1.2" d="M20,32 L80,32 L80,68 L20,68 Z M30,44 L70,44 M30,56 L60,56" stroke-dasharray="2 2"/><circle cx="50" cy="62" r="10" stroke="%238a6742" stroke-width="1" fill="none"/><text x="50" y="67" font-size="10" text-anchor="middle" fill="%237a5a3a" font-family="Georgia">月</text></svg>') no-repeat center;
    background-size: contain;
    pointer-events: none;
  }
  .inscription {
    position: absolute;
    bottom: 22px;
    right: 24px;
    font-size: 11px;
    color: #8b7355;
    opacity: 0.6;
    font-family: inherit;
    letter-spacing: 1px;
  }

  h1 {
    font-size: 32px;
    font-weight: 400;
    letter-spacing: 4px;
    color: #2d3e2b;
    margin-bottom: 20px;
    padding-bottom: 8px;
    display: inline-block;
    border-bottom: 1px solid #dccb9e;
  }

  .poem {
    font-size: 17px;
    color: #4f3e2a;
    line-height: 1.85;
    margin: 28px 0 36px;
    background: rgba(225, 210, 180, 0.3);
    padding: 14px 18px;
    border-radius: 48px;
    letter-spacing: 1px;
  }

  .btn {
    display: inline-block;
    background: #8b6a42;
    background: linear-gradient(135deg, #9e7a51, #7b593a);
    color: #fff6e5;
    text-decoration: none;
    padding: 16px 36px;
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 4px;
    border-radius: 60px;
    border: 1px solid #ecdbaa;
    box-shadow: 0 6px 14px rgba(0, 0, 0, 0.2);
    font-family: inherit;
    transition: 0.2s;
    width: auto;
    min-width: 210px;
  }

  .btn:active {
    transform: scale(0.97);
    background: #7b5a3a;
  }

  /* 手机窄屏优化 */
  @media (max-width: 500px) {
    body {
      padding: 16px;
    }
    .card {
      padding: 36px 20px 44px 20px;
    }
    h1 {
      font-size: 26px;
      letter-spacing: 2px;
    }
    .poem {
      font-size: 15px;
      padding: 12px 14px;
      margin: 24px 0 32px;
    }
    .btn {
      font-size: 18px;
      padding: 14px 28px;
      min-width: 180px;
    }
    .seal {
      width: 36px;
      height: 36px;
      left: 14px;
      top: 20px;
    }
    .inscription {
      font-size: 9px;
      bottom: 16px;
      right: 18px;
    }
  }
</style>
</head>
<body>
<div class="card">
  <div class="seal"></div>
  <div class="inscription">· 春江花月 ·</div>
  <h1>🌙 春江花月夜</h1>
  <div class="poem">
    江流宛转绕芳甸，月照花林皆似霰。<br>
    感谢您体验本次微慕课<br>恳请留下宝贵评价
  </div>
  <a href="https://wj.qq.com/s2/26225508/6b23/" class="btn" target="_blank">📜 进入评价</a>
</div>
</body>
</html>
