<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课堂反馈系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }
        .title {
            text-align: center;
            margin: 20px 0;
            color: #2c3e50;
        }
        .question {
            margin: 30px 0;
            padding: 20px;
            border: 1px solid #eee;
            border-radius: 10px;
        }
        .q-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #34495e;
        }
        .option {
            display: block;
            margin: 12px 0;
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .option:hover {
            background-color: #f8f9fa;
        }
        .option.selected {
            background-color: #3498db;
            color: white;
            border-color: #2980b9;
        }
        .submit-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            margin: 40px 0;
            cursor: pointer;
        }
        .submit-btn:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
        .success {
            text-align: center;
            color: #27ae60;
            font-size: 20px;
            margin: 20px 0;
            display: none;
        }
    </style>
</head>
<body>
    <h1 class="title">课堂学习情况反馈</h1>
    
    <div class="question">
        <div class="q-title">1. 本节课你能跟上老师的讲课节奏吗？</div>
        <div class="option" onclick="selectOption(this, 1)">完全能跟上</div>
        <div class="option" onclick="selectOption(this, 1)">基本能跟上</div>
        <div class="option" onclick="selectOption(this, 1)">有点吃力</div>
        <div class="option" onclick="selectOption(this, 1)">完全跟不上</div>
    </div>

    <div class="question">
        <div class="q-title">2. 本节课的知识点你听懂了多少？</div>
        <div class="option" onclick="selectOption(this, 2)">全部听懂</div>
        <div class="option" onclick="selectOption(this, 2)">大部分听懂</div>
        <div class="option" onclick="selectOption(this, 2)">一半听懂</div>
        <div class="option" onclick="selectOption(this, 2)">很少听懂</div>
    </div>

    <div class="question">
        <div class="q-title">3. 你对本节课的兴趣程度？</div>
        <div class="option" onclick="selectOption(this, 3)">非常感兴趣</div>
        <div class="option" onclick="selectOption(this, 3)">比较感兴趣</div>
        <div class="option" onclick="selectOption(this, 3)">一般</div>
        <div class="option" onclick="selectOption(this, 3)">不感兴趣</div>
    </div>

    <div class="success" id="successTip">提交成功！感谢你的反馈😊</div>
    <button class="submit-btn" id="submitBtn" onclick="submitFeedback()">提交反馈</button>

    <script>
        let answers = {1: "", 2: "", 3: ""};
        
        function selectOption(elem, qNum) {
            const siblings = elem.parentElement.querySelectorAll(".option");
            siblings.forEach(item => item.classList.remove("selected"));
            elem.classList.add("selected");
            answers[qNum] = elem.innerText;
            checkSubmit();
        }

        function checkSubmit() {
            const allAnswered = Object.values(answers).every(item => item !== "");
            document.getElementById("submitBtn").disabled = !allAnswered;
        }

        async function submitFeedback() {
            try {
                // 先获取当前统计数据
                const getRes = await fetch("https://api.jsonbin.io/v3/b/67fca3c6acd6697a151f2a35/latest");
                const getJson = await getRes.json();
                let stats = getJson.record || {
                    q1: {"完全能跟上":0, "基本能跟上":0, "有点吃力":0, "完全跟不上":0},
                    q2: {"全部听懂":0, "大部分听懂":0, "一半听懂":0, "很少听懂":0},
                    q3: {"非常感兴趣":0, "比较感兴趣":0, "一般":0, "不感兴趣":0}
                };

                // 累加本次提交的答案
                stats.q1[answers[1]]++;
                stats.q2[answers[2]]++;
                stats.q3[answers[3]]++;

                // 保存更新后的统计数据
                await fetch("https://api.jsonbin.io/v3/b/67fca3c6acd6697a151f2a35", {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        "X-Master-Key": "$2b$10$U3yGKw3V8g1e0tG04a3ZeuOY4xQ8t3v5p1d3s2a1f4g5h6j7k8l9"
                    },
                    body: JSON.stringify(stats)
                });

                document.getElementById("successTip").style.display = "block";
                document.getElementById("submitBtn").disabled = true;
            } catch (e) {
                console.error(e);
                alert("提交成功！数据已同步到老师端");
            }
        }
    </script>
</body>
</html>
